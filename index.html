<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজিটাল রমজান ক্যালেন্ডার ২০২৬</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* মডার্ন ব্যাকগ্রাউন্ড ও বডি ডিজাইন */
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* প্রিমিয়াম কন্টেইনার */
        .container { 
            background: #ffffff; 
            padding: 25px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
            max-width: 450px; 
            width: 100%; 
            box-sizing: border-box; 
        }

        /* ড্রপডাউন ডিজাইন */
        .district-selector { margin-bottom: 25px; width: 100%; }
        label { display: block; margin-bottom: 8px; color: #2e7d32; font-weight: 700; font-size: 1.1rem; }
        select { 
            width: 100%; 
            padding: 14px 15px; 
            border-radius: 12px; 
            border: 2px solid #a5d6a7; 
            font-family: 'Hind Siliguri'; 
            font-size: 1.1rem; 
            color: #1b5e20; 
            background: #f1f8e9; 
            outline: none; 
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232e7d32' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
        select:focus { border-color: #4caf50; }

        /* তারিখ ও রমজানের আধুনিক ব্যাজ */
        .header-info { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 25px; 
        }
        .badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border: 1px solid #c8e6c9;
        }

        /* জেলা ও টাইটেল */
        .title-container { text-align: center; margin-bottom: 25px; }
        h1 { color: #1b5e20; margin: 0; font-size: 1.8rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .subtitle { color: #4caf50; font-size: 1rem; font-weight: 600; margin-top: 5px; }

        /* সময়সূচি কার্ডস */
        .time-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; }
        .time-card { 
            background: #ffffff; 
            padding: 20px 10px; 
            border-radius: 16px; 
            border: 1px solid #e0e0e0; 
            width: 48%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }
        .time-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: #4caf50;
        }
        .time-label { font-size: 1.1rem; color: #616161; font-weight: 600; margin-bottom: 5px; text-align: center; }
        .time-value { font-size: 2.2rem; font-weight: 700; color: #2e7d32; }

        /* প্রিমিয়াম কাউন্টডাউন */
        .countdown { 
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%); 
            color: white; 
            padding: 25px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }
        .message { font-size: 1.2rem; margin-bottom: 10px; opacity: 0.9; font-weight: 500; }
        .countdown-timer { 
            font-size: 3rem; 
            font-weight: 700; 
            font-family: monospace; 
            letter-spacing: 2px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* লোগো ও অর্গানাইজেশন */
        .logo-container { margin-top: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; padding-top: 15px; border-top: 1px dashed #e0e0e0; }
        .association-logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #4caf50; padding: 3px; margin-bottom: 12px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .association-name { font-size: 1.25rem; color: #1b5e20; font-weight: 700; line-height: 1.4; width: 100%; text-align: center; display: block; }
        footer { font-size: 0.85rem; color: #757575; margin-top: 10px; text-align: center; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="district-selector">
        <label for="districtSelect">📍 আপনার জেলা নির্বাচন করুন:</label>
        <select id="districtSelect" onchange="changeDistrict()"></select>
    </div>

    <div class="header-info">
        <div class="badge" id="displayDate">--</div>
        <div class="badge" id="ramadanNo">-- রমজান</div>
    </div>

    <div class="title-container">
        <h1 id="districtTitle">🌙 সময়সূচী</h1>
        <div class="subtitle">আজকের সাহরী ও ইফতার</div>
    </div>

    <div class="time-row">
        <div class="time-card">
            <div class="time-label">সাহরীর শেষ সময়</div> 
            <div class="time-value" id="sahriTime">--:--</div>
        </div>
        <div class="time-card">
            <div class="time-label">ইফতার</div>
            <div class="time-value" id="iftarTime">--:--</div>
        </div>
    </div>

    <div class="countdown">
        <div class="message" id="statusMsg">অপেক্ষা করুন...</div>
        <div class="countdown-timer" id="timer">০০:০০:০০</div>
    </div>

    <div class="logo-container">
        <img src="logo.jpg.png" alt="Logo" class="association-logo">
        <div class="association-name">মির্জাগঞ্জ উপজেলা স্টুডেন্টস অ্যাসোসিয়েশন, বরিশাল</div>
        <footer>সোর্স: ইসলামিক ফাউন্ডেশন</footer>
    </div>
</div>

<script>
    var ramadanSchedule = [
        { d: "2026-02-19", s: "05:07", i: "17:56" }, { d: "2026-02-20", s: "05:06", i: "17:57" },
        { d: "2026-02-21", s: "05:05", i: "17:57" }, { d: "2026-02-22", s: "05:04", i: "17:58" },
        { d: "2026-02-23", s: "05:03", i: "17:58" }, { d: "2026-02-24", s: "05:02", i: "17:59" },
        { d: "2026-02-25", s: "05:02", i: "17:59" }, { d: "2026-02-26", s: "05:01", i: "18:00" },
        { d: "2026-02-27", s: "05:00", i: "18:00" }, { d: "2026-02-28", s: "04:59", i: "18:01" },
        { d: "2026-03-01", s: "04:58", i: "18:01" }, { d: "2026-03-02", s: "04:57", i: "18:02" },
        { d: "2026-03-03", s: "04:56", i: "18:02" }, { d: "2026-03-04", s: "04:55", i: "18:03" },
        { d: "2026-03-05", s: "04:54", i: "18:03" }, { d: "2026-03-06", s: "04:53", i: "18:04" },
        { d: "2026-03-07", s: "04:52", i: "18:04" }, { d: "2026-03-08", s: "04:51", i: "18:05" },
        { d: "2026-03-09", s: "04:50", i: "18:05" }, { d: "2026-03-10", s: "04:49", i: "18:06" },
        { d: "2026-03-11", s: "04:48", i: "18:06" }, { d: "2026-03-12", s: "04:47", i: "18:07" },
        { d: "2026-03-13", s: "04:46", i: "18:07" }, { d: "2026-03-14", s: "04:45", i: "18:08" },
        { d: "2026-03-15", s: "04:44", i: "18:08" }, { d: "2026-03-16", s: "04:43", i: "18:09" },
        { d: "2026-03-17", s: "04:42", i: "18:09" }, { d: "2026-03-18", s: "04:41", i: "18:10" },
        { d: "2026-03-19", s: "04:40", i: "18:10" }, { d: "2026-03-20", s: "04:39", i: "18:11" }
    ];

    var districtData = [
        { n: "পটুয়াখালী", s: 4, i: 3 }, { n: "বরিশাল", s: 3, i: 2 }, { n: "ঢাকা", s: 0, i: 0 },
        { n: "ভোলা", s: 2, i: 0 }, { n: "পিরোজপুর", s: 4, i: 3 }, { n: "বরগুনা", s: 5, i: 4 },
        { n: "ঝালকাঠি", s: 3, i: 2 }, { n: "চট্টগ্রাম", s: -5, i: -9 }, { n: "রাজশাহী", s: 7, i: 6 },
        { n: "সিলেট", s: -7, i: -10 }, { n: "খুলনা", s: 5, i: 4 }, { n: "রংপুর", s: 3, i: 1 },
        { n: "গাজীপুর", s: 0, i: 0 }, { n: "মানিকগঞ্জ", s: 1, i: 2 }, { n: "মুন্সীগঞ্জ", s: 0, i: 1 },
        { n: "নারায়ণগঞ্জ", s: -1, i: 0 }, { n: "নরসিংদী", s: -2, i: -1 }, { n: "টাঙ্গাইল", s: 2, i: 1 },
        { n: "ফরিদপুর", s: 2, i: 3 }, { n: "গোপালগঞ্জ", s: 3, i: 3 }, { n: "মাদারীপুর", s: 2, i: 2 },
        { n: "রাজবাড়ী", s: 2, i: 3 }, { n: "শরীয়তপুর", s: 1, i: 1 }, { n: "ময়মনসিংহ", s: 0, i: -1 },
        { n: "জামালপুর", s: 3, i: 0 }, { n: "নেত্রকোনা", s: -1, i: -3 }, { n: "শেরপুর", s: 2, i: -1 },
        { n: "কক্সবাজার", s: -5, i: -10 }, { n: "ব্রাহ্মণবাড়িয়া", s: -3, i: -3 }, { n: "চাঁদপুর", s: 0, i: -1 },
        { n: "কুমিল্লা", s: -2, i: -3 }, { n: "লক্ষ্মীপুর", s: 1, i: -1 }, { n: "নোয়াখালী", s: 0, i: -2 },
        { n: "ফেনী", s: -2, i: -4 }, { n: "খাগড়াছড়ি", s: -4, i: -8 }, { n: "রাঙ্গামাটি", s: -4, i: -9 },
        { n: "বান্দরবান", s: -4, i: -10 }, { n: "সিরাজগঞ্জ", s: 3, i: 2 }, { n: "পাবনা", s: 5, i: 4 },
        { n: "বগুড়া", s: 3, i: 1 }, { n: "জয়পুরহাট", s: 4, i: 2 }, { n: "নওগাঁ", s: 6, i: 4 },
        { n: "নাটোর", s: 5, i: 4 }, { n: "চাঁপাইনবাবগঞ্জ", s: 9, i: 7 }, { n: "দিনাজপুর", s: 6, i: 2 },
        { n: "গাইবান্ধা", s: 3, i: 0 }, { n: "কুড়িগ্রাম", s: 1, i: -2 }, { n: "লালমনিরহাট", s: 2, i: -1 },
        { n: "নীলফামারী", s: 5, i: 1 }, { n: "পঞ্চগড়", s: 7, i: 2 }, { n: "ঠাকুরগাঁও", s: 8, i: 3 },
        { n: "বাগেরহাট", s: 5, i: 3 }, { n: "চুয়াডাঙ্গা", s: 7, i: 7 }, { n: "যশোর", s: 6, i: 6 },
        { n: "ঝিনাইদহ", s: 6, i: 5 }, { n: "কুষ্টিয়া", s: 5, i: 5 }, { n: "মাগুরা", s: 4, i: 4 },
        { n: "মেহেরপুর", s: 8, i: 7 }, { n: "নড়াইল", s: 5, i: 4 }, { n: "সাতক্ষীরা", s: 7, i: 5 },
        { n: "হবিগঞ্জ", s: -5, i: -7 }, { n: "মৌলভীবাজার", s: -6, i: -9 }, { n: "সুনামগঞ্জ", s: -5, i: -7 }
    ];

    function toBangla(n) {
        var engStr = n.toString();
        var bnDigits = "০১২৩৪৫৬৭৮৯";
        var bnStr = "";
        for(var i=0; i<engStr.length; i++) {
            var ch = engStr.charAt(i);
            if(ch >= '0' && ch <= '9') { bnStr += bnDigits[parseInt(ch, 10)]; } 
            else { bnStr += ch; }
        }
        return bnStr;
    }

    function padZero(num) {
        return num < 10 ? "0" + num : num;
    }

    var select = document.getElementById('districtSelect');
    for(var i=0; i<districtData.length; i++) {
        var opt = document.createElement('option');
        opt.value = districtData[i].n;
        opt.innerText = districtData[i].n;
        select.appendChild(opt);
    }

    var currentDist = "পটুয়াখালী";
    try {
        if(localStorage.getItem('userDistrict')) { currentDist = localStorage.getItem('userDistrict'); }
    } catch(e) {}
    select.value = currentDist;

    function changeDistrict() {
        currentDist = select.value;
        try { localStorage.setItem('userDistrict', currentDist); } catch(e) {}
        update();
    }

    function addMins(timeStr, mins) {
        var parts = timeStr.split(':');
        var h = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        m += mins;
        while(m >= 60) { h++; m -= 60; }
        while(m < 0) { h--; m += 60; }
        return padZero(h) + ":" + padZero(m);
    }

    function update() {
        var now = new Date();
        var year = now.getFullYear();
        var month = padZero(now.getMonth() + 1);
        var day = padZero(now.getDate());
        var todayStr = year + "-" + month + "-" + day;
        
        var dist = districtData[0];
        for(var i=0; i<districtData.length; i++) {
            if(districtData[i].n === currentDist) { dist = districtData[i]; break; }
        }

        var idx = -1;
        for(var j=0; j<ramadanSchedule.length; j++) {
            if(ramadanSchedule[j].d === todayStr) { idx = j; break; }
        }

        var currentSec = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        var activeIdx = idx;
        var diff = 0;
        var msg = "";

        if (idx === -1) {
            if (todayStr < ramadanSchedule[0].d) {
                document.getElementById('ramadanNo').innerText = "অপেক্ষমান";
                document.getElementById('statusMsg').innerText = "রমজান শুরু হতে বাকি...";
                document.getElementById('timer').innerText = toBangla("০০:০০:০০");
                return;
            } else { 
                document.getElementById('ramadanNo').innerText = "ঈদ মোবারক";
                document.getElementById('displayDate').innerText = "--";
                document.getElementById('districtTitle').innerText = "🌙 " + currentDist;
                document.getElementById('sahriTime').innerText = "--:--";
                document.getElementById('iftarTime').innerText = "--:--";
                document.getElementById('statusMsg').innerText = "মাহে রমজান সমাপ্ত।";
                document.getElementById('timer').innerText = toBangla("০০:০০:০০");
                return;
            }
        }

        var data = ramadanSchedule[idx];
        var sahriStr = addMins(data.s, dist.s);
        var iftarStr = addMins(data.i, dist.i);

        var sParts = sahriStr.split(':');
        var sahriSec = (parseInt(sParts[0], 10) * 3600) + (parseInt(sParts[1], 10) * 60);
        var iParts = iftarStr.split(':');
        var iftarSec = (parseInt(iParts[0], 10) * 3600) + (parseInt(iParts[1], 10) * 60);

        if (currentSec < sahriSec) {
            activeIdx = idx;
            diff = sahriSec - currentSec; 
            msg = "সাহরীর শেষ সময়ের বাকি";
        } else if (currentSec < iftarSec) {
            activeIdx = idx;
            diff = iftarSec - currentSec; 
            msg = "ইফতারের বাকি";
        } else {
            if (idx + 1 < ramadanSchedule.length) {
                activeIdx = idx + 1;
                var nextData = ramadanSchedule[activeIdx];
                var nextSahriStr = addMins(nextData.s, dist.s);
                var nsParts = nextSahriStr.split(':');
                var nextSahriSec = (parseInt(nsParts[0], 10) * 3600) + (parseInt(nsParts[1], 10) * 60);
                diff = (86400 - currentSec) + nextSahriSec;
                msg = "পরবর্তী সাহরীর বাকি"; 
            } else { 
                document.getElementById('ramadanNo').innerText = "ঈদ মোবারক";
                document.getElementById('statusMsg').innerText = "মাহে রমজান সমাপ্ত।";
                document.getElementById('timer').innerText = toBangla("০০:০০:০০");
                return;
            }
        }

        var displayData = ramadanSchedule[activeIdx];
        var dSahriStr = addMins(displayData.s, dist.s);
        var dIftarStr = addMins(displayData.i, dist.i);

        var dateParts = displayData.d.split('-');
        var monthName = displayData.d.indexOf("-02-") !== -1 ? " ফেব্রুয়ারি" : " মার্চ";
        
        document.getElementById('displayDate').innerText = toBangla(dateParts[2]) + monthName;
        document.getElementById('ramadanNo').innerText = toBangla(activeIdx + 1) + " রমজান";
        document.getElementById('districtTitle').innerText = "🌙 " + currentDist;
        document.getElementById('sahriTime').innerText = toBangla(dSahriStr);
        
        var dIftarParts = dIftarStr.split(':');
        var ih = parseInt(dIftarParts[0], 10);
        var im = parseInt(dIftarParts[1], 10);
        var displayIh = ih > 12 ? ih - 12 : ih;
        document.getElementById('iftarTime').innerText = toBangla(displayIh + ":" + padZero(im));

        document.getElementById('statusMsg').innerText = msg;
        
        if (diff > 0) {
            var hr = Math.floor(diff / 3600);
            var mn = Math.floor((diff % 3600) / 60);
            var sc = diff % 60;
            document.getElementById('timer').innerText = toBangla(padZero(hr) + ":" + padZero(mn) + ":" + padZero(sc));
        } else { 
            document.getElementById('timer').innerText = toBangla("০০:০০:০০"); 
        }
    }

    setInterval(update, 1000); 
    update();
</script>
</body>
</html>
